{% extends "layout.html" %}
{% block content %}
<div class="mx-auto flex w-full flex-col justify-center space-y-6 sm:w-[350px] mt-10">
    <div class="flex flex-col space-y-2 text-center">
        <div class="mx-auto bg-muted p-3 rounded-full mb-2">
            <i data-lucide="chef-hat" class="h-6 w-6 text-foreground"></i>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight">Nuevo Repostero</h1>
        <p class="text-sm text-muted-foreground">Crea una cuenta para gestionar pedidos</p>
    </div>

    <div class="rounded-xl border border-border bg-card text-card-foreground shadow-sm p-6">
        <form method="POST" class="space-y-4">
            <div class="space-y-2">
                <label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Elige un Usuario</label>
                <input type="text" name="username" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" required placeholder="ej. maestro_pastelero">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Contraseña</label>
                <input type="password" name="password" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" required placeholder="••••••••">
            </div>
            <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 bg-foreground text-background hover:bg-foreground/90 h-10 px-4 py-2 w-full mt-2 gap-2">
                <i data-lucide="sparkles" class="h-4 w-4"></i> Crear Cuenta
            </button>
        </form>
    </div>
</div>
{% endblock %}
